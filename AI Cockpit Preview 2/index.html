            vUv = uv;
            // 关键修复：必须定义为 vec4 mvPosition 供下面的 fog_vertex 使用 [cite: 2026-03-30]
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); 
            gl_Position = projectionMatrix * mvPosition;
            
            // 内置宏会查找 mvPosition 变量并计算雾化深度 [cite: 2026-03-30]
            #include <fog_vertex> 
        }`,
    fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        varying vec2 vUv;
        
        #include <common>
        #include <fog_pars_fragment> 

        void main() {
            // 计算垂直渐变因子 (基于屏幕坐标 y)
            // 1080.0 是你的画布高度 [cite: 2026-03-30]
            float gradientFactor = gl_FragCoord.y / 1080.0; 
            gradientFactor = clamp(gradientFactor, 0.0, 1.0);

            // 混合参考图的两种灰色 [cite: 2026-03-30]
            vec3 finalColor = mix(bottomColor, topColor, gradientFactor);
            
            gl_FragColor = vec4(finalColor, 1.0);

            // 完美的内置雾化集成 [cite: 2026-03-30]
            #include <fog_fragment> 
        }`,
    fog: true // 开启此开关以激活 USE_FOG 宏 [cite: 2026-03-30]
});

const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.renderOrder = 1; // 明确渲染顺序
scene.add(ground);

    // --- 全局车漆材质缓存，以便工作区可以统一调节 ---
    let sharedBodyMaterial = null;
    let sharedGlassMaterial = null;
    let sharedFrontLampGlassMat = null;
    let sharedRearLampGlassMat = null;

    // UI 控制器绑定
    const initWorkspaceControls = (mat) => {
        if (!mat) return;
        const cColor = document.getElementById('ctrl-color');
        const cMetalness = document.getElementById('ctrl-metalness');
        const cRoughness = document.getElementById('ctrl-roughness');
        const cClearcoat = document.getElementById('ctrl-clearcoat');
        const cCCR = document.getElementById('ctrl-ccroughness');
        const cEnvMap = document.getElementById('ctrl-envmap');

        // 初始化时立即应用已保存的滑块值
        mat.color.set(cColor.value);
        mat.metalness = parseFloat(cMetalness.value);
        mat.roughness = parseFloat(cRoughness.value);
        mat.clearcoat = parseFloat(cClearcoat.value);
        mat.clearcoatRoughness = parseFloat(cCCR.value);
        mat.envMapIntensity = parseFloat(cEnvMap.value);
        mat.needsUpdate = true;
        cColor.addEventListener('input', e => {
            console.log('Color changed:', e.target.value);
            mat.color.set(e.target.value);
            mat.needsUpdate = true;
            document.getElementById('val-color').innerText = e.target.value;
        });
        cMetalness.addEventListener('input', e => {
            mat.metalness = parseFloat(e.target.value);
            mat.needsUpdate = true;
            document.getElementById('val-metalness').innerText = e.target.value;
        });
        cRoughness.addEventListener('input', e => {
            mat.roughness = parseFloat(e.target.value);
            mat.needsUpdate = true;
            document.getElementById('val-roughness').innerText = e.target.value;
        });
        cClearcoat.addEventListener('input', e => {
            mat.clearcoat = parseFloat(e.target.value);
            mat.needsUpdate = true;
            document.getElementById('val-clearcoat').innerText = e.target.value;
        });
        cCCR.addEventListener('input', e => {
            mat.clearcoatRoughness = parseFloat(e.target.value);
            mat.needsUpdate = true;
            document.getElementById('val-ccroughness').innerText = e.target.value;
        });
        cEnvMap.addEventListener('input', e => {
            mat.envMapIntensity = parseFloat(e.target.value);
            mat.needsUpdate = true;
            document.getElementById('val-envmap').innerText = e.target.value;
        });
    };

    // --- 3. 材质工厂 ---
    function loadPBR(name, isTransparent = false) {
        let texMapName = name;
        if (name.includes("Door") || name.includes("Body")) texMapName = "Body";
        else if (name.includes("Wheel")) texMapName = "Wheel";
        else if (name.includes("Lamps")) texMapName = "Lamps";
        else if (name.includes("Seat")) texMapName = "Seat";
        else if (name.includes("IP")) texMapName = "IP";
        else if (name.includes("Int")) texMapName = "Int";

        // --- 车身 / 车门 ---
        if (name.includes("Body") || name.includes("Door")) {
            if (sharedBodyMaterial) return sharedBodyMaterial;

            const base = texLoader.load(`texture/Tex_Body_Base.jpg`);
            base.flipY = false;
            base.colorSpace = THREE.SRGBColorSpace;

            // 车身使用 Base 贴图保留各部件正确颜色，color 作为叠加色调
            sharedBodyMaterial = new THREE.MeshPhysicalMaterial({
                map: base,
                // 铝银色：低粗糙度金属 + 强清漆层 = 效果图的高反光银色漆
                roughness: 0.21,
                metalness: 0.85,
                envMapIntensity: 0.1,
                clearcoat: 0.53,
                clearcoatRoughness: 0,
                // 轻微偏冷银色，与效果图的铝银漆吻合
                color: new THREE.Color(0xfafcff)
            });

            initWorkspaceControls(sharedBodyMaterial);
            return sharedBodyMaterial;
        }

        // --- 玻璃 ---
        if (isTransparent) {
            if (sharedGlassMaterial) return sharedGlassMaterial;

            sharedGlassMaterial = new THREE.MeshPhysicalMaterial({
                color: new THREE.Color(0x050505),
                roughness: 0.0,
                metalness: 0.15,
                clearcoat: 1.0,
                clearcoatRoughness: 0.0,
                envMapIntensity: 4.7,
                transparent: true,
                opacity: 0.72,
            });
            sharedGlassMaterial.envMapIntensity = parseFloat(document.getElementById('ctrl-glass-env').value);
            sharedGlassMaterial.opacity         = parseFloat(document.getElementById('ctrl-glass-opacity').value);
            sharedGlassMaterial.roughness       = parseFloat(document.getElementById('ctrl-glass-roughness').value);

            // 工作区绑定：全部玻璃共用同一材质，修改立刻全部生效
            document.getElementById('ctrl-glass-env').addEventListener('input', e => {
                sharedGlassMaterial.envMapIntensity = parseFloat(e.target.value);
                document.getElementById('val-glass-env').innerText = e.target.value;
            });
            document.getElementById('ctrl-glass-opacity').addEventListener('input', e => {
                sharedGlassMaterial.opacity = parseFloat(e.target.value);
                document.getElementById('val-glass-opacity').innerText = e.target.value;
            });
            document.getElementById('ctrl-glass-roughness').addEventListener('input', e => {
                sharedGlassMaterial.roughness = parseFloat(e.target.value);
                document.getElementById('val-glass-roughness').innerText = e.target.value;
            });

            return sharedGlassMaterial;
        }

        // --- 前灯玻璃 ---
        if (name === '__frontLampGlass__') {
            if (sharedFrontLampGlassMat) return sharedFrontLampGlassMat;
            sharedFrontLampGlassMat = new THREE.MeshPhysicalMaterial({
                color: new THREE.Color(0x111111),
                roughness: 0.05,
                metalness: 0.1,
                envMapIntensity: 2.0,
                emissive: new THREE.Color(0xffffff),
                emissiveIntensity: 1.0,
                transparent: true,
                opacity: 0.25,
            });
            sharedFrontLampGlassMat.opacity           = parseFloat(document.getElementById('ctrl-flg-opacity').value);
            sharedFrontLampGlassMat.roughness         = parseFloat(document.getElementById('ctrl-flg-roughness').value);
            sharedFrontLampGlassMat.emissive.set(document.getElementById('ctrl-flg-emissive').value);
            sharedFrontLampGlassMat.emissiveIntensity = parseFloat(document.getElementById('ctrl-flg-emissive-int').value);
            sharedFrontLampGlassMat.envMapIntensity   = parseFloat(document.getElementById('ctrl-flg-env').value);
            document.getElementById('ctrl-flg-opacity').addEventListener('input', e => {
                sharedFrontLampGlassMat.opacity = parseFloat(e.target.value);
                document.getElementById('val-flg-opacity').innerText = e.target.value;
            });
            document.getElementById('ctrl-flg-roughness').addEventListener('input', e => {
                sharedFrontLampGlassMat.roughness = parseFloat(e.target.value);
                document.getElementById('val-flg-roughness').innerText = e.target.value;
            });
            document.getElementById('ctrl-flg-emissive').addEventListener('input', e => {
                sharedFrontLampGlassMat.emissive.set(e.target.value);
                document.getElementById('val-flg-emissive').innerText = e.target.value;
            });
            document.getElementById('ctrl-flg-emissive-int').addEventListener('input', e => {
                sharedFrontLampGlassMat.emissiveIntensity = parseFloat(e.target.value);
                document.getElementById('val-flg-emissive-int').innerText = e.target.value;
            });
            document.getElementById('ctrl-flg-env').addEventListener('input', e => {
                sharedFrontLampGlassMat.envMapIntensity = parseFloat(e.target.value);
                document.getElementById('val-flg-env').innerText = e.target.value;
            });
            return sharedFrontLampGlassMat;
        }

        // --- 后灯玻璃 ---
        if (name === '__rearLampGlass__') {
            if (sharedRearLampGlassMat) return sharedRearLampGlassMat;
            sharedRearLampGlassMat = new THREE.MeshPhysicalMaterial({
                color: new THREE.Color(0x111111),
                roughness: 0.05,
                metalness: 0.1,
                envMapIntensity: 2.0,
                emissive: new THREE.Color(0xff2020),
                emissiveIntensity: 0,
                transparent: true,
                opacity: 0.25,
            });
            sharedRearLampGlassMat.opacity           = parseFloat(document.getElementById('ctrl-rlg-opacity').value);
            sharedRearLampGlassMat.roughness         = parseFloat(document.getElementById('ctrl-rlg-roughness').value);
            sharedRearLampGlassMat.emissive.set(document.getElementById('ctrl-rlg-emissive').value);
            sharedRearLampGlassMat.emissiveIntensity = parseFloat(document.getElementById('ctrl-rlg-emissive-int').value);
            sharedRearLampGlassMat.envMapIntensity   = parseFloat(document.getElementById('ctrl-rlg-env').value);
            document.getElementById('ctrl-rlg-opacity').addEventListener('input', e => {
                sharedRearLampGlassMat.opacity = parseFloat(e.target.value);
                document.getElementById('val-rlg-opacity').innerText = e.target.value;
            });
            document.getElementById('ctrl-rlg-roughness').addEventListener('input', e => {
                sharedRearLampGlassMat.roughness = parseFloat(e.target.value);
                document.getElementById('val-rlg-roughness').innerText = e.target.value;
            });
            document.getElementById('ctrl-rlg-emissive').addEventListener('input', e => {
                sharedRearLampGlassMat.emissive.set(e.target.value);
                document.getElementById('val-rlg-emissive').innerText = e.target.value;
            });
            document.getElementById('ctrl-rlg-emissive-int').addEventListener('input', e => {
                sharedRearLampGlassMat.emissiveIntensity = parseFloat(e.target.value);
                document.getElementById('val-rlg-emissive-int').innerText = e.target.value;
            });
            document.getElementById('ctrl-rlg-env').addEventListener('input', e => {
                sharedRearLampGlassMat.envMapIntensity = parseFloat(e.target.value);
                document.getElementById('val-rlg-env').innerText = e.target.value;
            });
            return sharedRearLampGlassMat;
        }

        // --- 轮毂：只用 Base 贴图，无需 ORM/Normal ---
        if (name.includes("Wheel")) {
            const base = texLoader.load(`texture/Tex_Wheel_Base.jpg`);
            base.flipY = false;
            base.colorSpace = THREE.SRGBColorSpace;
            return new THREE.MeshStandardMaterial({
                map: base,
                roughness: 0.45,
                metalness: 0.9,
                envMapIntensity: 1.2
            });
        }

        // --- 刹车卡钳 ---
        if (name.toLowerCase().includes("caliper")) {
            return new THREE.MeshStandardMaterial({
                color: new THREE.Color(0xff6600),
                roughness: 0.2,
                metalness: 0.8
            });
        }

        // --- 内饰 (Seat / IP / Int) ---
        if (name.includes("Seat") || name.includes("IP") || name.includes("Int")) {
            const base = texLoader.load(`texture/Tex_${texMapName}_Base.jpg`);
            base.flipY = false;
            base.colorSpace = THREE.SRGBColorSpace;
            return new THREE.MeshStandardMaterial({ map: base, roughness: 0.9, metalness: 0.0 });
        }

        // --- 默认 ---
        const base = texLoader.load(`texture/Tex_${texMapName}_Base.jpg`);
        base.flipY = false;
        base.colorSpace = THREE.SRGBColorSpace;
        return new THREE.MeshStandardMaterial({ map: base, roughness: 0.7 });
    }

    new GLTFLoader(loadingManager).load("p7i.glb", (gltf) => {
        gltf.scene.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                const n = child.name;
                
                // --- 材质识别逻辑 ---
                if (n.includes("Body") || n.includes("Door")) {
                    child.material = loadPBR(n);
                } else if (n.toLowerCase().includes("caliper")) {
                    child.material = loadPBR("caliper");
                } else if (n.includes("Glass")) {
                    const nl = n.toLowerCase();
                    console.log('[Glass mesh]', n);
                    const isRearLampGlass = nl.includes('tail') || nl.includes('rear') || nl.includes('back');
                    const isFrontLampGlass = !isRearLampGlass && (nl.includes('front') || nl.includes('head'));
                    if (isFrontLampGlass) {
                        child.material = loadPBR('__frontLampGlass__');
                    } else if (isRearLampGlass) {
                        child.material = loadPBR('__rearLampGlass__');
                    } else {
                        child.material = loadPBR("Glass", true);
                    }
                } else if (n.includes("Seat") || n.includes("IP") || n.includes("Int")) {
                    child.material = loadPBR(n.includes("Seat") ? "Seat" : n.includes("IP") ? "IP" : "Int");
                } else if (n.includes("Wheel")) {
                    child.material = loadPBR(n);
                } 
            // --- 灯光：只用 Base 贴图 + 发光，去掉 ORM/Normal 贴图开销 ---
else if (n.includes("Lamp")) {
    const lBase = texLoader.load(`texture/Tex_Lamps_Base.jpg`);
    lBase.flipY = false;
    lBase.colorSpace = THREE.SRGBColorSpace;
    const isRear = n.toLowerCase().includes('tail') ||
                   n.toLowerCase().includes('rear') ||
                   n.toLowerCase().includes('back');
    child.material = new THREE.MeshStandardMaterial({
        map: lBase,
        roughness: 0.15,
        metalness: 0.5,
        envMapIntensity: 1.5,
        emissive: isRear ? new THREE.Color(0xff2020) : new THREE.Color(0xffffff),
        emissiveIntensity: isRear ? 0 : 3,
    });
}

        }
    });
        scene.add(gltf.scene);
        
        });

    // --- 修复点 3 & 4：解决挤压变形与分屏构图偏移 ---
    // 监听分屏切换事件，彻底解决挤压问题 [cite: 2026-03-30]
// 监听分屏切换事件，处理运镜
let _camTween = null;
window.addEventListener('app-state-change', (e) => {
    const snap = e.detail && e.detail.snap || 'state-a';
    if (snap === 'state-c') return;

    // 根据吸附位置选择目标相机参数
    const camTargets = {
        'state-a': { dist: 11.3, elev: 1.5, az: 126 },
        'center':  { dist: 21.1, elev: 14.5, az: 142 },
        'right':   { dist: 12.8, elev: 5.5, az: 126 },
    };
    const target = camTargets[snap] || camTargets['state-a'];

    // 终止之前未完成的运镜
    if (_camTween) _camTween.kill();

    // 读取当前滑块值作为起点
    const cur = { dist: readCraneSliders().dist, elev: readCraneSliders().elev, az: readCraneSliders().az };
    _camTween = gsap.to(cur, {
        dist: target.dist, elev: target.elev, az: target.az,
        duration: 0.8, ease: "power2.inOut",
        onUpdate() {
            applyCraneCamera(cur.dist, cur.elev, cur.az);
            document.getElementById('ctrl-distance').value = cur.dist.toFixed(1);
            document.getElementById('val-distance').innerText = cur.dist.toFixed(1);
            document.getElementById('ctrl-elevation').value = cur.elev.toFixed(1);
            document.getElementById('val-elevation').innerText = cur.elev.toFixed(1) + '°';
            document.getElementById('ctrl-azimuth').value = cur.az.toFixed(0);
            document.getElementById('val-azimuth').innerText = cur.az.toFixed(0) + '°';
        },
        onComplete() { _camTween = null; }
    });
});

    // 交互点击（仅精确点击响应，拖拽不触发）
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let _clickDownX = 0, _clickDownY = 0;
    threeCanvas.addEventListener('pointerdown', (e) => {
        _clickDownX = e.clientX;
        _clickDownY = e.clientY;
    });
    window.addEventListener("click", (event) => {
        const dx = event.clientX - _clickDownX;
        const dy = event.clientY - _clickDownY;
        if (dx * dx + dy * dy > 25) return; // 移动超过 5px → 判定为拖拽，忽略
        const rect = threeCanvas.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(scene.children, true);
        if (intersects.length > 0) {
            let obj = intersects[0].object;
            while (obj) {
                if (obj.name.startsWith("Door_")) {
                    const isOpen = obj.userData.isOpen || false;
                    const angle = obj.name.includes("_L") ? -0.85 : 0.85;
                    gsap.to(obj.rotation, { y: isOpen ? 0 : angle, duration: 1.2, ease: "power2.inOut" });
                    obj.userData.isOpen = !isOpen; break;
                }
                obj = obj.parent;
            }
        }
    });
// 获取包裹画布的精确容器
const sceneContainer = document.getElementById('three-js-canvas-container');
let _skipRendererResize = false;
let _lastRenderW = 0, _lastRenderH = 0;

function _syncRendererSize() {
    const w = sceneContainer.offsetWidth;
    const h = sceneContainer.offsetHeight;
    if (w > 0 && h > 0 && (w !== _lastRenderW || h !== _lastRenderH)) {
        renderer.setSize(w, h, true);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        _lastRenderW = w;
        _lastRenderH = h;
    }
}
window.addEventListener('resize', _syncRendererSize);

function animate() {
        requestAnimationFrame(animate);
    if (!_skipRendererResize) {
        _syncRendererSize();
    }
        ground.visible = false;         // 【核心修复】：在捕捉阴影前，让真正的地面隐身！防止它被当成障碍物算进深度图
        shadowPlane.visible = false;    // 同时也让新的阴影平面隐身
        shadowHelper.update(); // 此时相机里只有干干净净的车
        ground.visible = true;  // 捕捉完毕，立刻让地面恢复显示
        shadowPlane.visible = true;
        
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
